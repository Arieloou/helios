syntax = "proto3";

package encryption;

// Servicio de cifrado/descifrado de información.
// Protocolo de comunicación inter-servicios para Helios.
service EncryptionService {
  // Cifra texto plano y devuelve el resultado en Base64.
  rpc Encrypt (EncryptRequest) returns (EncryptResponse);

  // Descifra texto cifrado (Base64) y devuelve el texto plano original.
  rpc Decrypt (DecryptRequest) returns (DecryptResponse);
}

// --- Mensajes de Cifrado ---

message EncryptRequest {
  string plaintext = 1;  // Texto plano a cifrar (UTF-8)
}

message EncryptResponse {
  string ciphertext = 1;  // Texto cifrado en Base64 (nonce + tag + ciphertext)
  bool success = 2;       // Indica si la operación fue exitosa
  string message = 3;     // Mensaje descriptivo (error o confirmación)
}

// --- Mensajes de Descifrado ---

message DecryptRequest {
  string ciphertext = 1;  // Texto cifrado en Base64
}

message DecryptResponse {
  string plaintext = 1;   // Texto plano descifrado (UTF-8)
  bool success = 2;       // Indica si la operación fue exitosa
  string message = 3;     // Mensaje descriptivo (error o confirmación)
}
