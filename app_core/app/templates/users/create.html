{% extends "base.html" %}

{% block title %}Crear Usuario - Helios{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-helios-border p-6">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-helios-text">Crear Nuevo Usuario</h1>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-helios-text mb-1.5">Nombre de usuario</label>
                    <input type="text" name="username" id="username" required
                        class="w-full px-3 py-2 border border-helios-border rounded-md focus:outline-none focus:ring-2 focus:ring-helios-primary focus:border-transparent transition-colors bg-white">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-helios-text mb-1.5">Email (opcional)</label>
                    <input type="email" name="email" id="email"
                        class="w-full px-3 py-2 border border-helios-border rounded-md focus:outline-none focus:ring-2 focus:ring-helios-primary focus:border-transparent transition-colors bg-white">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-helios-text mb-1.5">Contraseña</label>
                    <input type="password" name="password" id="password" required
                        class="w-full px-3 py-2 border border-helios-border rounded-md focus:outline-none focus:ring-2 focus:ring-helios-primary focus:border-transparent transition-colors bg-white">
                </div>

                <div>
                    <label for="role" class="block text-sm font-medium text-helios-text mb-1.5">Rol</label>
                    <select name="role" id="role" required
                        class="w-full px-3 py-2 border border-helios-border rounded-md focus:outline-none focus:ring-2 focus:ring-helios-primary focus:border-transparent transition-colors bg-white">
                        <option value="agent">Agente de Seguridad</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
            </div>

            <div class="mt-6 flex gap-3">
                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                    Crear Usuario
                </button>
                <a href="/users" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
