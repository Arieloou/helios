<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Helios - Plataforma de Gestión de Riesgos. Portal de acceso seguro.">
    <title>Helios — Iniciar Sesión</title>
    <!-- Google Fonts: Inter for clean, modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Design tokens ── */
        :root {
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-50: #eff6ff;
            --green-50: #f0fdf4;
            --green-600: #16a34a;
            --green-700: #15803d;
            --red-50: #fef2f2;
            --red-600: #dc2626;
            --red-700: #b91c1c;
            --radius: 10px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,.08);
            --transition: 200ms ease;
        }

        /* ── Base ── */
        html, body { height: 100%; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--white);
            color: var(--gray-900);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout: centered single column ── */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            background: var(--white);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fade-up .5s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Brand header ── */
        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px; height: 56px;
            border-radius: 14px;
            background: var(--blue-50);
            color: var(--blue-600);
            margin-bottom: 1.25rem;
        }
        .brand-icon svg { width: 28px; height: 28px; }
        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
        }
        .brand-tagline {
            font-size: 0.875rem;
            color: var(--gray-400);
            margin-top: 0.35rem;
            font-weight: 400;
        }

        /* ── Flash messages ── */
        .flash-msg {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.8125rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .flash-error {
            background: var(--red-50);
            color: var(--red-700);
        }
        .flash-success {
            background: var(--green-50);
            color: var(--green-700);
        }
        .flash-info {
            background: var(--blue-50);
            color: var(--blue-700);
        }

        /* ── Form ── */
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 0.375rem;
        }

        /* Input wrapper with icon */
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
            position: absolute;
            left: 12px;
            width: 18px; height: 18px;
            color: var(--gray-400);
            pointer-events: none;
            transition: color var(--transition);
        }
        .form-input {
            width: 100%;
            padding: 0.6875rem 0.875rem 0.6875rem 2.5rem;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--gray-900);
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .form-input::placeholder { color: var(--gray-400); }
        .form-input:focus {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }
        .input-wrap:focus-within .input-icon { color: var(--blue-500); }

        /* Password toggle button */
        .toggle-pw {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 4px;
            transition: color var(--transition);
            display: flex;
        }
        .toggle-pw:hover { color: var(--gray-700); }

        /* ── Submit button ── */
        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.75rem;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--white);
            background: var(--blue-600);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background var(--transition), box-shadow var(--transition), transform 120ms ease;
        }
        .btn-login:hover {
            background: var(--blue-700);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .btn-login:active { transform: scale(0.985); }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.75rem 0;
            color: var(--gray-300);
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        /* ── Security badge ── */
        .security-badge {
            text-align: center;
            font-size: 0.75rem;
            color: var(--gray-400);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
        }
        .security-badge svg { color: var(--gray-300); }

        /* ── Focus visible ring ── */
        *:focus-visible {
            outline: 2px solid var(--blue-500);
            outline-offset: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-page { padding: 1.5rem 1rem; }
            .login-container { max-width: 100%; }
        }
    </style>
</head>
<body>
    <main class="login-page" role="main">
        <div class="login-container">

            <!-- Brand header -->
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1 class="brand-name">Helios</h1>
                <p class="brand-tagline">Gestión de Riesgos de Información</p>
            </div>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-msg flash-{{ category }}" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Login form -->
            <form method="POST" id="login-form" novalidate>

                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="username">Usuario</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                        </svg>
                        <input type="text" id="username" name="username" class="form-input"
                               placeholder="Ingresa tu usuario" required autocomplete="username" autofocus>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                        </svg>
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Ingresa tu contraseña" required autocomplete="current-password"
                               style="padding-right: 2.5rem;">
                        <button type="button" class="toggle-pw" id="toggle-pw-btn" aria-label="Mostrar contraseña">
                            <svg id="eye-open" width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                            </svg>
                            <svg id="eye-closed" width="18" height="18" viewBox="0 0 20 20" fill="currentColor" style="display:none;">
                                <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/>
                                <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <div class="flex items-center justify-between mb-4">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="remember" id="remember" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <span class="ml-2 text-sm text-gray-600">Recordarme</span>
                    </label>
                    <a href="#" class="text-sm text-blue-600 hover:text-blue-700">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login" id="login-submit">
                    Ingresar
                </button>
            </form>

            <!-- Security info -->
            <div class="divider"></div>
            <div class="security-badge">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.68.056-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                Protegido con cifrado AES-256-GCM
            </div>
        </div>
    </main>

    <script>
        // ── Toggle password visibility ──
        const toggleBtn = document.getElementById('toggle-pw-btn');
        const pwInput   = document.getElementById('password');
        const eyeOpen   = document.getElementById('eye-open');
        const eyeClosed = document.getElementById('eye-closed');

        if (toggleBtn && pwInput) {
            toggleBtn.addEventListener('click', () => {
                const isHidden = pwInput.type === 'password';
                pwInput.type = isHidden ? 'text' : 'password';
                eyeOpen.style.display   = isHidden ? 'none' : 'block';
                eyeClosed.style.display = isHidden ? 'block' : 'none';
                toggleBtn.setAttribute('aria-label',
                    isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
            });
        }

        // ── Prevent double submission ──
        const form = document.getElementById('login-form');
        form.addEventListener('submit', () => {
            const btn = document.getElementById('login-submit');
            btn.disabled = true;
            btn.textContent = 'Autenticando…';
        });
    </script>
</body>
</html>
