{% extends "base.html" %}

{% block title %}Editar Tarea - Helios{% endblock %}

{% block content %}
<h1>Editar Tarea</h1>

<form method="POST">
    <label for="description">Descripción:</label>
    <textarea name="description" id="description" rows="4">{{ task.description }}</textarea>

    <label for="responsible">Responsable:</label>
    <input type="text" name="responsible" id="responsible" value="{{ task.responsible or '' }}">

    <label for="due_date">Fecha Límite:</label>
    <input type="date" name="due_date" id="due_date" value="{{ task.due_date or '' }}">

    <label for="status">Estado:</label>
    <select name="status" id="status">
        <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>Pendiente</option>
        <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>En Progreso</option>
        <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completado</option>
    </select>

    <label for="progress_percentage">Progreso (%):</label>
    <input type="range" name="progress_percentage" id="progress_percentage" min="0" max="100" value="{{ task.progress_percentage }}" oninput="this.nextElementSibling.value = this.value">
    <output>{{ task.progress_percentage }}</output>%

    <div style="margin-top: 1rem;">
        <button type="submit">Guardar Cambios</button>
        <a href="/treatment/plan/{{ task.plan_id }}" style="margin-left: 1rem;">Cancelar</a>
    </div>
</form>
{% endblock %}
