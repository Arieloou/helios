{% extends "base.html" %}

{% block title %}Editar Tarea - Helios{% endblock %}

{% block content %}
<h1>Editar Tarea</h1>

<form method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
        <label for="priority" class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
        <select name="priority" id="priority" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Baja</option>
            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Media</option>
            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>Alta</option>
            <option value="critical" {% if task.priority == 'critical' %}selected{% endif %}>Crítica</option>
        </select>
    </div>
    <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <textarea name="description" id="description" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="updateCharCount(this, 'desc-count', 500)">{{ task.description }}</textarea>
        <div class="text-right text-sm text-gray-500 mt-1"><span id="desc-count">{{ task.description|length }}</span>/500</div>
    </div>

    <div>
        <label for="responsible" class="block text-sm font-medium text-gray-700 mb-1">Responsable</label>
        <select name="responsible" id="responsible" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Seleccionar Responsable --</option>
            <option value="John Doe" {% if task.responsible == 'John Doe' %}selected{% endif %}>John Doe</option>
            <option value="Jane Smith" {% if task.responsible == 'Jane Smith' %}selected{% endif %}>Jane Smith</option>
            <option value="Security Team" {% if task.responsible == 'Security Team' %}selected{% endif %}>Security Team</option>
            <option value="IT Operations" {% if task.responsible == 'IT Operations' %}selected{% endif %}>IT Operations</option>
        </select>
    </div>

    <div>
        <label for="due_date" class="block text-sm font-medium text-gray-700 mb-1">Fecha Límite</label>
        <input type="date" name="due_date" id="due_date" value="{{ task.due_date or '' }}" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
        <select name="status" id="status" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>Pendiente</option>
            <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>En Progreso</option>
            <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completado</option>
        </select>
    </div>

    <div>
        <label for="progress_percentage" class="block text-sm font-medium text-gray-700 mb-1">Progreso: <span class="text-gray-500">{{ task.progress_percentage }}%</span></label>
        <input type="range" name="progress_percentage" id="progress_percentage" min="0" max="100" value="{{ task.progress_percentage }}" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" oninput="this.previousElementSibling.querySelector('span').textContent = this.value + '%'">
    </div>

    <div class="flex gap-3 pt-4">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Guardar Cambios</button>
        <button type="reset" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50">Limpiar</button>
        <a href="/treatment/plan/{{ task.plan_id }}" class="px-4 py-2 text-gray-700 hover:text-gray-900">Cancelar</a>
    </div>
</form>
{% endblock %}
