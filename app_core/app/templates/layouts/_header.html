<header class="bg-helios-surface border-b border-helios-border sticky top-0 z-30" role="banner">
    <div class="flex items-center justify-between h-16 px-4">
        <div class="flex items-center">
            <button id="mobile-sidebar-toggle"
                class="md:hidden p-2 rounded-md hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-helios-primary mr-2"
                aria-label="Abrir menú">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>

        <div class="flex items-center space-x-3">
            {% if current_user %}
            <div class="flex items-center gap-2">
                <span class="text-sm text-helios-text-muted">
                    <span class="font-medium text-helios-text">{{ current_user.username }}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full 
                        {% if current_user.role == 'admin' %}
                        bg-helios-primary text-white
                        {% else %}
                        bg-helios-secondary text-white
                        {% endif %}
                    ">
                        {% if current_user.role == 'ADMIN' %}Administrador{% else %}Agente{% endif %}
                    </span>
                </span>
            </div>
            <a href="/auth/logout" class="btn btn-secondary btn-sm flex items-center gap-1.5" title="Cerrar sesión">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="hidden sm:inline">Cerrar sesión</span>
            </a>
            {% endif %}
        </div>
    </div>
</header>
