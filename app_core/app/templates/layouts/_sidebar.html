<script>
    (function() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const sidebarTexts = document.querySelectorAll('.sidebar-text');
        const toggleIcon = toggleBtn.querySelector('svg');
        
        let isExpanded = false;

        function updateSidebar() {
            if (isExpanded) {
                sidebar.style.width = '16rem';
                sidebarTexts.forEach(el => el.classList.remove('hidden'));
                toggleIcon.style.transform = 'rotate(0deg)';
            } else {
                sidebar.style.width = '4rem';
                sidebarTexts.forEach(el => el.classList.add('hidden'));
                toggleIcon.style.transform = 'rotate(180deg)';
            }
            localStorage.setItem('sidebar_expanded', isExpanded);
        }

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            updateSidebar();
        });

        const savedState = localStorage.getItem('sidebar_expanded');
        if (savedState !== null) {
            isExpanded = savedState === 'true';
        }
        updateSidebar();
    })();
</script>

<style>
    .sidebar-link {
        @apply flex items-center gap-3 px-3 py-2.5 rounded-md text-sm font-medium text-helios-text-muted hover:text-helios-primary hover:bg-gray-50 transition-colors duration-200;
    }
    
    .sidebar-link.router-link-active {
        @apply bg-helios-primary bg-opacity-10 text-helios-primary;
    }

    .sidebar-text {
        @apply whitespace-nowrap transition-opacity duration-200;
    }

    @media (max-width: 768px) {
        #sidebar {
            transform: translateX(-100%);
        }
        
        #sidebar.mobile-open {
            transform: translateX(0);
        }
    }
</style>
